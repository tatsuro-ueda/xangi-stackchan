; M5Stack 公式 K151 / K151-R 版スタックチャン用 Arduino ファーム。

[platformio]
default_envs = m5stack-cores3

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0

; HomeCalibration ファーム: サーボ EEPROM の SetMiddle (中央位置焼き込み) 用
; 焼き方: pio run -e m5stack-cores3-homecal -t upload
[env:m5stack-cores3-homecal]
extends = env:m5stack-cores3
build_src_filter = -<*> +<../examples/HomeCalibration/*>
lib_deps =
    m5stack/M5Unified @ ^0.2.7

; SetAngleDemo ファーム: NVS の zero raw を使って yaw を ±30° スイープする
; 初の torque ON 系デモ。HomeCalibration を先に焼いて zero を保存しておくこと。
; 焼き方: pio run -e m5stack-cores3-setangle-demo -t upload
[env:m5stack-cores3-setangle-demo]
extends = env:m5stack-cores3
build_src_filter = -<*> +<../examples/SetAngleDemo/*>

; SpeakerDemo ファーム: CoreS3 内蔵スピーカーから 16kHz/16bit/mono の
; 440Hz 0.5s WAV (起動時に動的生成) を `M5.Speaker.playWav` で再生する。
; サーボには触らないため PY32 VM_EN も叩かず、HomeCalibration の前後どちら
; でも単独で焼ける。Step D (xangi SSE bridge) の playWav 経路の前段検証用。
; 焼き方: pio run -e m5stack-cores3-speaker-demo -t upload
[env:m5stack-cores3-speaker-demo]
extends = env:m5stack-cores3
build_src_filter = -<*> +<../examples/SpeakerDemo/*>
lib_deps =
    m5stack/M5Unified @ ^0.2.7

; XangiBridge ファーム: xangi (or 任意ホスト) のシリアル経由音声出力デバイス。
; プロトコル: STATUS / VOLUME:N / WAV:N+バイナリ / FACE:<expr> / MOVE:Y,P /
; **CAPTURE (Phase 1A、CoreS3 内蔵 GC0308 カメラ → JPEG → シリアル送信)** (詳細は
; docs/xangi_bridge_protocol.md)。Avatar 統合 + 再生中の口パク連動 +
; サーボ MOVE + カメラスナップショット。
; Python 側は src/xangi_stackchan/stackchan.py がそのまま使える (DEFAULT_BAUD=921600)。
; 焼き方: pio run -e m5stack-cores3-xangi-bridge -t upload
[env:m5stack-cores3-xangi-bridge]
extends = env:m5stack-cores3
build_src_filter = -<*> +<../examples/XangiBridge/*>
upload_speed = 1500000
monitor_speed = 921600
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    m5stack/M5CoreS3 @ ^1.0.1
    meganetaaan/M5Stack-Avatar @ ^0.10.0

; AtomVoiceBridge ファーム: M5Stack AtomS3R + Atomic Voice Base / Atomic Echo Base
; 用 XangiBridge プロトコル互換ファーム。サーボ・カメラ非対応の graceful
; degradation 版 (STATUS/VOLUME/WAV/FACE 動作、MOVE/CAPTURE は unavailable)。
; M5Unified が ES8311 audio codec を `cfg.external_speaker.atomic_echo = true`
; で自動初期化。Serial baud = 115200 (AtomS3R USB-CDC 安定値、stackchan-atama
; リポ準拠)。Python 側は `--baud 115200` で接続する。
; 焼き方: pio run -e m5stack-atoms3r-atom-voice-bridge -t upload
[env:m5stack-atoms3r-atom-voice-bridge]
platform    = espressif32@6.11.0
board       = m5stack-atoms3
framework   = arduino
board_build.filesystem = spiffs
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
monitor_speed = 115200
upload_speed = 1500000
build_src_filter = -<*> +<../examples/AtomVoiceBridge/*>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_M5STACK_ATOMS3R
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0
