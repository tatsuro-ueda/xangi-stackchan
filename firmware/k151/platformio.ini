; M5Stack 公式 K151 / K151-R 版スタックチャン用 Arduino ファーム。

[platformio]
default_envs = m5stack-cores3

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0

; HomeCalibration ファーム: サーボ EEPROM の SetMiddle (中央位置焼き込み) 用
; 焼き方: pio run -e m5stack-cores3-homecal -t upload
[env:m5stack-cores3-homecal]
extends = env:m5stack-cores3
build_src_filter = -<*> +<../examples/HomeCalibration/*>
lib_deps =
    m5stack/M5Unified @ ^0.2.7

; SetAngleDemo ファーム: NVS の zero raw を使って yaw を ±30° スイープする
; 初の torque ON 系デモ。HomeCalibration を先に焼いて zero を保存しておくこと。
; 焼き方: pio run -e m5stack-cores3-setangle-demo -t upload
[env:m5stack-cores3-setangle-demo]
extends = env:m5stack-cores3
build_src_filter = -<*> +<../examples/SetAngleDemo/*>

; SpeakerDemo ファーム: CoreS3 内蔵スピーカーから 16kHz/16bit/mono の
; 440Hz 0.5s WAV (起動時に動的生成) を `M5.Speaker.playWav` で再生する。
; サーボには触らないため PY32 VM_EN も叩かず、HomeCalibration の前後どちら
; でも単独で焼ける。Step D (xangi SSE bridge) の playWav 経路の前段検証用。
; 焼き方: pio run -e m5stack-cores3-speaker-demo -t upload
[env:m5stack-cores3-speaker-demo]
extends = env:m5stack-cores3
build_src_filter = -<*> +<../examples/SpeakerDemo/*>
lib_deps =
    m5stack/M5Unified @ ^0.2.7

; XangiBridge ファーム: xangi (or 任意ホスト) のシリアル経由音声出力デバイス。
; プロトコル: STATUS / VOLUME:N / WAV:N+バイナリ / FACE:<expr> (詳細は
; docs/xangi_bridge_protocol.md)。サーボ非依存、**Avatar 統合 (Step D-2)**:
; 顔表示 + setExpression + 再生中の口パク連動 (setMouthOpenRatio)。
; Python 側は src/xangi_stackchan/stackchan.py がそのまま使える (DEFAULT_BAUD=921600)。
; 焼き方: pio run -e m5stack-cores3-xangi-bridge -t upload
[env:m5stack-cores3-xangi-bridge]
extends = env:m5stack-cores3
build_src_filter = -<*> +<../examples/XangiBridge/*>
upload_speed = 1500000
monitor_speed = 921600
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0
