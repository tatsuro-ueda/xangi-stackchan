; xangi-stackchan ファーム群 (PlatformIO project)
;
; 対応ハードウェアと env:
;   - CoreS3 系 (K151 / K151-R / CoreS3 単体): cores3-main / cores3-home-calibration /
;     cores3-set-angle-demo / cores3-speaker-demo / cores3-safe-startup
;   - AtomS3R + Atomic Voice/Echo Base:        atoms3r-main
;   - M5Stack Basic + アールティ Ver.β:         basic-main
;
; どの env も Arduino + M5Unified + M5Stack-Avatar をベースに、`xangi_bridge_protocol.md`
; のシリアルプロトコル (STATUS / VOLUME / WAV / FACE / MOVE / CAPTURE) を実装する。
; CoreS3 系の本体ファームはサーボ・カメラの有無を起動時に自動検出し、応答しないものは
; STATUS の servo/camera/torque で false を返す graceful degradation 設計。

[platformio]
default_envs = cores3-main
src_dir = examples

[env:cores3-base]
platform = espressif32
board = m5stack-cores3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0

; 本体ファーム (K151 / K151-R / CoreS3 単体)。xangi のシリアル経由音声デバイスとして
; STATUS / VOLUME / WAV / FACE / MOVE / CAPTURE を実装、Avatar + 再生中の口パク連動 +
; サーボ MOVE + 内蔵カメラ JPEG キャプチャ。サーボ/カメラ未搭載機種では自動 graceful
; degradation。Python 側 src/xangi_stackchan/stackchan.py がそのまま使える (DEFAULT_BAUD=921600)。
; 焼き方: pio run -e cores3-main -t upload
[env:cores3-main]
extends = env:cores3-base
build_src_filter = -<*> +<cores3/main/*>
upload_speed = 1500000
monitor_speed = 921600
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    m5stack/M5CoreS3 @ ^1.0.1
    meganetaaan/M5Stack-Avatar @ ^0.10.0
    file://./lib/scservo
    file://./lib/si12t

; サーボ EEPROM の中央位置 (zero raw) を NVS に焼き込むためのキャリブレーション
; ファーム。K151 / K151-R で初回セットアップ時に 1 回焼く。
; 焼き方: pio run -e cores3-home-calibration -t upload
[env:cores3-home-calibration]
extends = env:cores3-base
build_src_filter = -<*> +<cores3/home-calibration/*>
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    file://./lib/scservo

; NVS の zero raw を使って yaw を ±30° スイープする torque ON 系デモ。
; home-calibration を先に焼いて zero を保存しておくこと。
; 焼き方: pio run -e cores3-set-angle-demo -t upload
[env:cores3-set-angle-demo]
extends = env:cores3-base
build_src_filter = -<*> +<cores3/set-angle-demo/*>

; CoreS3 内蔵スピーカーで 440Hz 0.5s WAV を `M5.Speaker.playWav` 再生する単独デモ。
; サーボ電源を叩かないので home-calibration の前後どちらでも単独で焼ける。
; 焼き方: pio run -e cores3-speaker-demo -t upload
[env:cores3-speaker-demo]
extends = env:cores3-base
build_src_filter = -<*> +<cores3/speaker-demo/*>
lib_deps =
    m5stack/M5Unified @ ^0.2.7

; サーボ電源系統と SCServo 通信を疎通確認するだけの安全起動ファーム。loop は
; 表情切替だけで何もしない (サーボ触らず、手で動かせる状態を保つ)。home-calibration
; の前にハードウェア構成を確認する用途。
; 焼き方: pio run -e cores3-safe-startup -t upload
[env:cores3-safe-startup]
extends = env:cores3-base
build_src_filter = -<*> +<cores3/safe-startup/*>
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0
    file://./lib/scservo

; AtomS3R + Atomic Voice Base / Atomic Echo Base 用ファーム。サーボ・カメラ非対応の
; graceful degradation 版 (STATUS/VOLUME/WAV/FACE 動作、MOVE/CAPTURE は unavailable)。
; M5Unified が ES8311 audio codec を `cfg.external_speaker.atomic_echo = true` で自動初期化。
; Serial baud = 115200 (AtomS3R USB-CDC 安定値)。Python 側は `--baud 115200`。
; 焼き方: pio run -e atoms3r-main -t upload
[env:atoms3r-main]
platform = espressif32@6.11.0
board    = m5stack-atoms3
framework = arduino
board_build.filesystem = spiffs
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_build.psram_type          = opi
monitor_speed = 115200
upload_speed = 1500000
build_src_filter = -<*> +<atoms3r/main/*>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_M5STACK_ATOMS3R
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0

; M5Stack Basic + Feetech SCS0009 ×2 (アールティ Ver.β) 用ファーム。PSRAM 無し /
; カメラ無し前提で WAV バッファ戦略を変更 (内部 DRAM 96KB 上限の同期再生)、サーボは
; Stack-chan PCB 経由 (Serial2 GPIO16/17, 1Mbps) で SCServo SCS0009 を制御。
; Serial baud = 115200 (Basic CP2104)。Python 側は `--baud 115200`。
; 焼き方: pio run -e basic-main -t upload
[env:basic-main]
platform = espressif32 @ ^6.11.0
board = m5stack-core-esp32
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
board_build.partitions = huge_app.csv
build_src_filter = -<*> +<basic/main/*>
build_flags =
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    m5stack/M5Unified @ ^0.2.7
    meganetaaan/M5Stack-Avatar @ ^0.10.0
    file://./lib/scservo
